name: Entity Congruence Audit

on:
  pull_request:
    paths:
      - "apps/signal-noise-app/src/app/api/admin/entity-reconciliation/**"
      - "apps/signal-noise-app/src/app/api/sync/**"
      - "apps/signal-noise-app/scripts/qa-entity-congruence-audit.mjs"
      - "apps/signal-noise-app/package.json"
      - ".github/workflows/entity-congruence-audit.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "apps/signal-noise-app/src/app/api/admin/entity-reconciliation/**"
      - "apps/signal-noise-app/src/app/api/sync/**"
      - "apps/signal-noise-app/scripts/qa-entity-congruence-audit.mjs"
      - "apps/signal-noise-app/package.json"
      - ".github/workflows/entity-congruence-audit.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: entity-congruence-audit-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  congruence-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/signal-noise-app
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/signal-noise-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Assert Supabase secrets are present
        run: |
          missing=0
          if [ -z "${SUPABASE_URL}" ] && [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]; then
            echo "Missing secret: SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL"
            missing=1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ] && [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ] && [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY or NEXT_PUBLIC_SUPABASE_ANON_KEY or SUPABASE_ANON_KEY"
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Run entity congruence audit
        run: npm run qa:entity-congruence-audit

  congruence-audit-report:
    runs-on: ubuntu-latest
    needs: congruence-audit
    if: always()
    defaults:
      run:
        working-directory: apps/signal-noise-app
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/signal-noise-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate entity congruence JSON report
        run: |
          mkdir -p artifacts
          npm run qa:entity-congruence-audit -- --json --no-fail --out artifacts/entity-congruence-audit.json --summary-md artifacts/entity-congruence-audit-summary.md

      - name: Publish audit summary
        run: |
          cat artifacts/entity-congruence-audit-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Emit check annotations
        run: |
          node -e '
            const fs = require("fs");
            const p = "artifacts/entity-congruence-audit.json";
            const d = JSON.parse(fs.readFileSync(p, "utf8"));
            const checks = Array.isArray(d.checks) ? d.checks : [];
            const failed = checks.filter((c) => !c.ok);
            if (failed.length === 0) {
              console.log("No failed congruence checks.");
              process.exit(0);
            }
            for (const c of failed) {
              const details = JSON.stringify(c.details || {});
              console.log(`::error title=Entity Congruence Check Failed::${c.id} ${details}`);
            }
          '

      - name: Upload entity congruence report
        uses: actions/upload-artifact@v4
        with:
          name: entity-congruence-audit-report
          path: |
            apps/signal-noise-app/artifacts/entity-congruence-audit.json
            apps/signal-noise-app/artifacts/entity-congruence-audit-summary.md
          if-no-files-found: error
          retention-days: 14

      - name: Post PR audit comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: entity-congruence-audit
          path: apps/signal-noise-app/artifacts/entity-congruence-audit-summary.md
